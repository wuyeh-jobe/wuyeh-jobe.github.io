---
layout: page
title: Blog
permalink: /blog/
---

<ul class="post-list">
  {% for post in site.posts %}
    <li>
      <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      {% if post.description %}
        <p class="post-description">{{ post.description }}</p>
      {% endif %}
    </li>
  {% endfor %}
</ul>
