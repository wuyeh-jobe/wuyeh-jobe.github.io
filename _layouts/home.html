---
layout: default
---

{{ content }}

<section class="home-section">
  <h2>Latest posts</h2>
  <ul class="post-list">
    {% for post in site.posts limit:5 %}
      <li>
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
        <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
      </li>
    {% endfor %}
  </ul>
  <p><a href="{{ site.baseurl }}/blog/">View all posts →</a></p>
</section>
