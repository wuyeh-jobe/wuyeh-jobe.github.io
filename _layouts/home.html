---
layout: default
---

{{ content }}

<section class="home-section">
  <h2>Latest posts</h2>
  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
        {% if post.description %}
          <p class="post-description">{{ post.description }}</p>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
  <p><a href="{{ site.baseurl }}/blog/">View all posts →</a></p>
</section>
